backend:
  name: git-gateway
  repo: mssngr/gabriel-for-denver
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/7bba3a0d-ccbf-4fb5-895f-2848f2cebad4/pkce
  auth_token_endpoint: /sites/7bba3a0d-ccbf-4fb5-895f-2848f2cebad4/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://gabrielfordenver.com
media_folder: "src/assets/images"
public_folder: "src/assets/images"
collections:
  - label: Pages
    name: pages
    files:
      - label: Home
        name: home
        file: site/pages/home.yml
        fields:
          - { label: Heading, name: heading, widget: string }
          - { label: Heading (Spanish), name: heading_es, widget: string }
          - { label: Content, name: content, widget: richtext }
          - { label: Content (Spanish), name: content_es, widget: richtext }
          - { label: Photo, name: photo, widget: image }
          - { label: Photo Alt Text, name: photoAltText, widget: string }
          - {
              label: Photo Alt Text (Spanish),
              name: photoAltText_es,
              widget: string,
            }
      - label: Issues
        name: issues
        file: site/pages/issues.yml
        fields:
          - { label: Heading, name: heading, widget: string }
          - { label: Heading (Spanish), name: heading_es, widget: string }
          - { label: Content, name: content, widget: richtext }
          - { label: Content (Spanish), name: content_es, widget: richtext }
          - { label: Photo, name: photo, widget: image }
          - { label: Photo Alt Text, name: photoAltText, widget: string }
          - {
              label: Photo Alt Text (Spanish),
              name: photoAltText_es,
              widget: string,
            }
  - label: Issues
    name: issues
    folder: site/issues
    extension: yml
    create: true
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Title (Spanish), name: title_es, widget: string }
      - { label: Content, name: content, widget: richtext }
      - { label: Content (Spanish), name: content_es, widget: richtext }
      - { label: Link, name: link, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Lucide Icon, name: lucideIcon, widget: string }
      - { label: Order, name: order, widget: number }
