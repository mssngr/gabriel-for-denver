heading: Issues Denver faces
heading_es: Retos que enfrenta Denver
content: >-
  I love living in Denver. It is the only city I truly think I could call home.
  But with the Trump administration targeting it, the cost of living going
  through the roof, homelessness rapidly rising, Denver Police avoiding
  accountability, and corporations trying to take advantage of us, **our home is
  in danger.**\

  \

  I'm tired of waiting for politicians to do the right thing. I believe in bringing solutions instead of complaints. Here are mine.
content_es: >-
  Me encanta vivir en Denver. Es la única ciudad que verdaderamente podría
  llamar hogar. Pero con la administración Trump apuntando contra ella, el costo
  de vida por las nubes, la situación de personas sin hogar aumentando
  rápidamente, la Policía de Denver evadiendo la rendición de cuentas y las
  corporaciones tratando de aprovecharse de nosotros, **nuestro hogar está en
  peligro.**\

  \

  Estoy cansado de esperar a que los políticos hagan lo correcto. Creo en aportar soluciones en lugar de quejas. Aquí están las mías.
