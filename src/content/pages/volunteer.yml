heading: Volunteer
heading_es: Voluntario
content: >-
  You. **Yes, you!** We need your help. We want to change local politics to not
  be about insiders and "playing the game." It should be about regular people
  (like you and I) **taking the reigns of our city's destiny** and steering it
  with prudence and empathy. That's what politics should always have been about.


  You can help us do just that. Whether it's hitting the pavement, setting up tables and chairs, or making some phone calls. **Join us in building the Denver we always wanted.**
content_es: >-
  Usted. **¡Sí, usted!** Necesitamos su ayuda. Queremos cambiar la política
  local para que no se trate de personas con información privilegiada ni de
  "jugar el juego." Debería tratarse de gente común (como usted y yo) **tomando
  las riendas del destino de nuestra ciudad** y guiándolo con prudencia y
  empatía. De eso siempre debió tratarse la política.


  Usted puede ayudarnos a lograrlo. Ya sea recorriendo las calles, armando mesas y sillas, o haciendo algunas llamadas telefónicas. **Únase a nosotros para construir el Denver que siempre quisimos.**
photoAltText: A drawing of several people with one person highlighted
photoAltText_es: Un dibujo de varias personas con una persona resaltada
