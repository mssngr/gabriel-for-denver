heading: Support us
heading_es: Apóyanos
content: >-
  Every little bit actually does count. I am participating in the [Fair
  Elections
  Fund.](https://www.denvergov.org/Government/Agencies-Departments-Offices/Agencies-Departments-Offices-Directory/Denver-Clerk-and-Recorder/Fair-Elections-Fund)
  This means I'm committed to not taking large donations from any corporation or
  individual.\

  \

  Because of that commitment, if you are a Denver resident, **the
  first $50 of your donation is matched 900%** by the city! $5 becomes $50. $50
  becomes $500.\

  \

  Your donation, even a small one, has a huge impact! So, please, if you believe in what I'm doing, send something along to make sure our voice matters!
content_es: >-
  Cada pequeña contribución realmente cuenta. Estoy participando en el [Fondo de
  Elecciones Justas (Fair Elections
  Fund)](https://www.denvergov.org/Government/Agencies-Departments-Offices/Agencies-Departments-Offices-Directory/Denver-Clerk-and-Recorder/Fair-Elections-Fund).
  Esto significa que me he comprometido a no aceptar donaciones grandes de
  ninguna corporación o individuo. Y, gracias a ese compromiso, si usted es
  residente de Denver,
  **¡los primeros $50 de su donación son igualados en un 900%** por la ciudad! $5 se convierten en $50. $50 se
  convierten en $500.\

  \

  ¡Su donación, incluso una pequeña, tiene un gran impacto! Así que, por favor, si usted cree en lo que estoy haciendo, envíe algo para asegurarnos de que nuestra voz cuente.
