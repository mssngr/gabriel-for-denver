heading: Events
heading_es: Eventos
content: >-
  Here's where I'm going to be in the upcoming weeks. You can meet me in
  person, ask me questions, tell me you like my glasses, or even sign my
  petition to be on November's ballot. 😁 **Looking forward to seeing you
  there!**\

  \

  Have an event you want me to come to? [Send a request, here.](/get-involved/events/request)
content_es: >-
  Aquí es donde estaré en las próximas semanas. Puede conocerme en persona,
  hacerme preguntas, decirme que le gustan mis lentes, o incluso firmar mi
  petición para aparecer en la boleta electoral de noviembre. 😁 **¡Espero
  verlo/a allí!**\

  \

  ¿Tiene un evento al que le gustaría que asistiera? [Envíe una solicitud, aquí.](/es/get-involved/events/request)
