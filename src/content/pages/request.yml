heading: Request an event
heading_es: Solicitar un evento
content: >-
  I am available to talk to your community group, join your podcast, answer
  questions town-hall style, or any other way I can have a more **in-depth
  conversation with the Denver community.**\

  \

  Put in some details, below, and we
  will figure out how to make it happen.
content_es: >-
  Estoy disponible para hablar con su grupo comunitario, participar en su
  podcast, responder preguntas al estilo de una asamblea pública, o cualquier
  otra forma de tener **una conversación más a fondo con la comunidad de Denver.**\

  \

  Ingrese algunos detalles a continuación y buscaremos la manera de hacerlo realidad.
photoAltText: A raccoon giving a presentation to some woodland animals
photoAltText_es: Un mapache dando una presentación a unos animales del bosque
