heading: Get in touch
heading_es: Contáctanos
content: >-
  This campaign is an interview for a job to represent you at the city level.
  Talk to me about it. What do you want to see from me? Tell me an idea of
  yours. Get into an in-depth conversation with me.\

  \

  Or, if you have a question or some feedback, this is the perfect place to ask it.\

  \

  Want me to come speak to a group or on your podcast? [Request an event here.](/get-involved/events/request)
content_es: >-
  Esta campaña es una entrevista para un trabajo que me representará a usted a
  nivel municipal. Hábleme de ello. ¿Qué le gustaría ver de mí? Cuénteme una
  idea suya. Entremos en una conversación a fondo.\

  \

  O, si tiene una pregunta o algún comentario, este es el lugar perfecto para hacerlo.\

  \

  ¿Quiere que hable con un grupo o participe en su podcast? [Solicite un evento aquí.](/es/get-involved/events/request)
photoAltText: A woman talking on the phone, wrapped up in the cord.
photoAltText_es: Una mujer hablando por teléfono, envuelta en el cable.
